<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セルフオーダーシステム - ビールメニュー</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="order-container">
    <main class="main-content">
      
  <header class="tab-bar">
    <button class="tab-btn-top">
      <img src="./lastAssignment/icon_top.png" alt="TOP icon" class="tab-icon">
      <span>TOP</span>
    </button>
    
    <button class="tab-btn tab-btn-beer active" data-category="beer">
      <img src="./lastAssignment/tab-btn-Active.png" alt="active-btn" class="beer-img">
      <span class="beer-text">Beer</span>
    </button>
    <button class="tab-btn" data-category="main"><span>Main</span></button>
    <button class="tab-btn" data-category="snacks"><span>Snacks</span></button>
    <button class="tab-btn" data-category="fresh"><span>Fresh</span></button>
    <button class="tab-btn" data-category="sweets"><span>Sweets</span></button>
    <button class="tab-btn" data-category="drink"><span>Drink</span></button>
  </header>

  <div class="menu-grid-wrapper" id="menuGridWrapper">
    <button class="nav-before-btn"></button>
    <div class="menu-grid" id="menuGrid"></div>
    <button class="nav-next-btn"></button>
  </div>
<div class="checkout-grid-wrapper" id="checkoutGridWrapper" style="display: none;">
    <div class="checkout-container">
      <div class="checkout-header">
        <h2>会計確認</h2>
      </div>
      
      <div class="checkout-content-body">
        <div class="checkout-list-wrapper">
          <table class="checkout-table">
            <thead>
              <tr>
                <th class="checkout-col-name">商品名</th>
                <th class="checkout-col-qty">個数</th>
                <th class="checkout-col-subtotal">小計</th>
              </tr>
            </thead>
            <tbody id="checkoutTableBody">
              </tbody>
          </table>
        </div>
        
        <div class="checkout-summary-card">
          <div class="summary-title">支払合計金額</div>
          <div class="summary-total-price" id="checkoutTotalPrice">¥0</div>
          <div class="summary-notice">※現計、または伝票をレジまでお持ちください。</div>
          <button class="checkout-final-btn" onclick="executeFinalCheckout()">お会計を確定する</button>
        </div>
      </div>
    </div>
  </div>
  <div class="history-grid-wrapper" id="historyGridWrapper" style="display: none;">
    <div class="history-container">
      <div class="history-header">
        <h2>注文履歴</h2>
      </div>
      
      <div class="history-list-wrapper">
        <table class="history-table">
          <thead>
            <tr>
              <th class="col-time">注文時間</th>
              <th class="col-status">状態</th>
              <th class="col-name">商品名</th>
              <th class="col-qty">数量</th>
              <th class="col-price">金額</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            </tbody>
        </table>
      </div>
      
      <div class="history-footer">
        <div class="history-total">
          <span>合計金額（税込）：</span>
          <span id="historyTotalPrice">¥0</span>
        </div>
      </div>
    </div>
  </div>
<div class="service-grid-wrapper" id="serviceGridWrapper" style="display: none;">
    <div class="service-container">
      <div class="service-header">
        <h2>サービス・アメニティ注文
        </h2>
      </div>
      
      <div class="service-items-grid">
        
        <div class="service-card">
          <div class="service-item-name">おしぼり</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('oshibori', -1, event)">-</button>
            <div id="serviceQty_oshibori" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('oshibori', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('oshibori', 'おしぼり')">注文する</button>
        </div>

        <div class="service-card">
          <div class="service-item-name">お冷</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('mizu', -1, event)">-</button>
            <div id="serviceQty_mizu" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('mizu', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('mizu', 'お冷')">注文する</button>
        </div>

        <div class="service-card">
          <div class="service-item-name">小皿</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('kodara', -1, event)">-</button>
            <div id="serviceQty_kodara" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('kodara', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('kodara', '小皿')">注文する</button>
        </div>

        <div class="service-card">
          <div class="service-item-name">箸</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('hashi', -1, event)">-</button>
            <div id="serviceQty_hashi" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('hashi', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('hashi', '箸')">注文する</button>
        </div>

        <div class="service-card">
          <div class="service-item-name">スプーン</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('spoon', -1, event)">-</button>
            <div id="serviceQty_spoon" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('spoon', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('spoon', 'スプーン')">注文する</button>
        </div>
        <div class="service-card">
          <div class="service-item-name">フォーク</div>
          <div class="service-qty-control">
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('fork', -1, event)">-</button>
            <div id="serviceQty_fork" class="service-qty-text">1</div>
            <button type="button" class="service-qty-btn" onclick="changeServiceQuantity('fork', 1, event)">+</button>
          </div>
          <button class="service-submit-btn" onclick="requestService('fork', 'フォーク')">注文する</button>
        </div>
        
      </div>
    </div>
  </div>
</main>

    <aside class="sidebar-right">
      <div class="utility-bar">
        <button class="util-btn btn-check">
          <span class="util-label">会計確認</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-call">
          <img src="./lastAssignment/icon_call.png" alt="Call icon" class="btn-icon">
          <span class="util-label">店員呼出</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-service">
          <span class="util-label">サービス</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-history">
          <span class="util-label">注文履歴</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-lang">
          <span class="util-label">Language</span>
        </button>
      </div>

      <section class="cart-section">
        <div class="cart-container">
          <header class="cart-header">
            <img src="./lastAssignment/icon_cart.png" alt="Cart icon" class="cart-icon">
            <h2>注文リスト</h2>
          </header>

          <div class="cart-items-scroll" id="cartItems"></div>

          <div class="cart-footer">
            <div class="total-amount">合計：<span id="totalPrice">￥0</span></div>
            <button class="confirm-order-btn">✓注文確定</button>
          </div>
        </div>

      </section>
    </aside>
  </div>
                <div id="specialPresentation" class="special-presentation-container"></div>

<div id="productModal" class="modal-overlay">
  <div class="modal-card">
    <button class="modal-close-btn" onclick="closeModal()">×</button>
    <div id="modalContent">
      </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
