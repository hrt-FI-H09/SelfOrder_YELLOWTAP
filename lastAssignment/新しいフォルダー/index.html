<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セルフオーダーシステム - ビールメニュー</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="order-container">
    <main class="main-content">
      
<header class="tab-bar">
  <button class="tab-btn-top">
    <img src="./lastAssignment/icon_top.png" alt="TOP icon" class="tab-icon">
    <span>TOP</span>
  </button>
  
  <!-- data-category を追加。Beerは初期状態で active クラスを付与 -->
  <button class="tab-btn tab-btn-beer active" data-category="beer">
    <img src="./lastAssignment/tab-btn-Active.png" alt="active-btn" class="beer-img">
    <span class="beer-text">Beer</span>
  </button>
  <button class="tab-btn" data-category="main"><span>Main</span></button>
  <button class="tab-btn" data-category="snacks"><span>Snacks</span></button>
  <button class="tab-btn" data-category="fresh"><span>Fresh</span></button>
  <button class="tab-btn" data-category="sweets"><span>Sweets</span></button>
  <button class="tab-btn" data-category="drink"><span>Drink</span></button>
</header>

      <div class="menu-grid-wrapper">
        <button class="nav-before-btn"></button>
        <div class="menu-grid" id="menuGrid"></div>
        <button class="nav-next-btn"></button>
      </div>
    </main>

    <aside class="sidebar-right">
      <div class="utility-bar">
        <button class="util-btn btn-check">
          <span class="util-label">会計確認</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-call">
          <img src="./lastAssignment/icon_call.png" alt="Call icon" class="btn-icon">
          <span class="util-label">店員呼出</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-service">
          <span class="util-label">サービス</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-history">
          <span class="util-label">注文履歴</span>
          <div class="tap-head"></div>
        </button>
        <button class="util-btn btn-lang">
          <span class="util-label">Language</span>
        </button>
      </div>

      <section class="cart-section">
        <div class="cart-container">
          <header class="cart-header">
            <img src="./lastAssignment/icon_cart.png" alt="Cart icon" class="cart-icon">
            <h2>注文リスト</h2>
          </header>

          <div class="cart-items-scroll" id="cartItems"></div>

          <div class="cart-footer">
            <div class="total-amount">合計：<span id="totalPrice">￥0</span></div>
            <button class="confirm-order-btn">✓注文確定</button>
          </div>
        </div>

      </section>
    </aside>
  </div>
  
<div id="productModal" class="modal-overlay">
  <div class="modal-card">
    <button class="modal-close-btn" onclick="closeModal()">×</button>
    <div id="modalContent">
      </div>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
